{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block extra_css %}
<style>
.hero{
    text-align:center;
    color:white;
    margin-top:100px;
}

.hero h1{
    font-size:48px;
}

.hero p{
    max-width:700px;
    margin:auto;
    margin-top:20px;
    font-size:18px;
}

.hero-btn{
    margin-top:30px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ef629f;
    font-weight:bold;
    cursor:pointer;
}
</style>
{% endblock %}

{% block content %}
<div style="
  margin-top:16px;
  border-radius: 22px;
  overflow:hidden;
  border: 1px solid rgba(255,255,255,.18);
  background: rgba(255,255,255,.10);
  backdrop-filter: blur(12px);
  box-shadow: 0 16px 40px rgba(0,0,0,.18);
">
  <div style="padding:14px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px;">
    <div style="font-weight:800; letter-spacing:.2px;">📍 แผนที่</div>
    <div style="color: rgba(255,255,255,.75); font-weight:600; font-size:14px;">
      (กดลาก/ซูมได้)
    </div>
  </div>

  <!-- เปลี่ยน src เป็นสถานที่ของคุณได้ -->
  <iframe
    src="https://www.google.com/maps?q=Sripatum%20University&output=embed"
    width="100%"
    height="420"
    style="border:0; display:block; filter:saturate(1.05) contrast(1.02);"
    allowfullscreen=""
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>
</div>
{% endblock %}
