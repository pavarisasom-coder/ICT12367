{% extends "base.html" %}

{% block title %}
<title>About - Gallery</title>
{% endblock %}

{% block content %}

<style>
    .gallery-section{
        padding: 60px 20px;
        min-height: 80vh;
        background: linear-gradient(135deg, #fbc2eb, #fad0c4);
    }

    .gallery-title{
        text-align: center;
        font-size: 36px;
        font-weight: bold;
        margin-bottom: 40px;
        color: #444;
    }

    .gallery-container{
        max-width: 1100px;
        margin: auto;
    }

    .gallery-grid{
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .gallery-card{
        background: white;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        transition: 0.4s;
    }

    .gallery-card:hover{
        transform: translateY(-8px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.18);
    }

    .gallery-card img{
        width: 100%;
        height: 220px;
        object-fit: cover;
    }

    .gallery-card-body{
        padding: 15px;
        text-align: center;
        font-weight: 600;
        color: #666;
    }
</style>

<section class="gallery-section">
    <div class="gallery-container">
        <h2 class="gallery-title">🌸 Coffee Gallery 🌸</h2>

        <div class="gallery-grid">

            <div class="gallery-card">
                <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93" alt="">
                <div class="gallery-card-body">Hot Latte</div>
            </div>

            <div class="gallery-card">
                <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085" alt="">
                <div class="gallery-card-body">Morning Coffee</div>
            </div>

            <div class="gallery-card">
                <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348" alt="">
                <div class="gallery-card-body">Cappuccino</div>
            </div>

            <div class="gallery-card">
                <img src="https://images.unsplash.com/photo-1504754524776-8f4f37790ca0" alt="">
                <div class="gallery-card-body">Coffee Beans</div>
            </div>

            <div class="gallery-card">
                <img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735" alt="">
                <div class="gallery-card-body">Fresh Brew</div>
            </div>

            <div class="gallery-card">
                <img src="https://images.unsplash.com/photo-1447933601403-0c6688de566e" alt="">
                <div class="gallery-card-body">Coffee Farm</div>
            </div>

        </div>
    </div>
</section>

{% endblock %}
