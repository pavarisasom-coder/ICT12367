<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Website{% endblock %}</title>

    <style>
        body{
            margin:0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg,#f1b5da,#dd9db9);
        }

        /* Navbar */
        .navbar{
            background: rgba(180, 11, 90, 0.3);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
        }

        .navbar a{
            text-decoration:none;
            margin-right:20px;
            font-weight:600;
            color:#333;
        }

        .navbar a:hover{
            color:#fff;
        }

        .container{
            padding:60px 20px;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <div class="navbar">
        <a href="/">หน้าแรก</a>
        <a href="/about">เกี่ยวกับเรา</a>
        <a href="/form">แบบฟอร์ม</a>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
